<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Job Agent</title>
    <style>
        :root { --bg: #15181d; --surface: #20252c; --border: #353d47; --text: #f4f7fb; --muted: #a9b2bf; --blue: #59c3f7; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--bg); color: var(--text); font-family: Arial, "Microsoft YaHei", sans-serif; }
        .auth-shell { width: min(420px, calc(100% - 32px)); padding: 34px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 18px 50px rgba(0,0,0,.22); }
        h1 { margin: 0; color: var(--blue); text-align: center; font-size: 2rem; }
        .subtitle { margin: 10px 0 28px; color: var(--muted); text-align: center; font-size: .95rem; }
        .message { min-height: 22px; margin-bottom: 12px; color: #ffcc66; text-align: center; }
        label { display: block; margin: 14px 0 6px; color: #d8e0e8; font-size: .9rem; }
        input { width: 100%; padding: 12px 13px; border: 1px solid var(--border); border-radius: 7px; background: #111419; color: var(--text); font-size: .95rem; }
        button { width: 100%; margin-top: 22px; padding: 12px; border: 0; border-radius: 7px; background: var(--blue); color: #10202c; font-weight: bold; cursor: pointer; }
        .switch { margin: 20px 0 0; color: var(--muted); text-align: center; font-size: .9rem; }
        a { color: var(--blue); }
    </style>
</head>
<body>
<main class="auth-shell">
    <h1>AI Job Agent</h1>
    <p class="subtitle">AI-powered Resume Analysis Platform</p>
    <div class="message">{{ error or '' }}</div>
    <form method="POST">
        <label for="username">用户名</label>
        <input id="username" type="text" name="username" placeholder="请输入用户名" required>
        <label for="password">密码</label>
        <input id="password" type="password" name="password" placeholder="请输入密码" required>
        <button type="submit">登录</button>
    </form>
    <p class="switch">还没有账号？<a href="/register">立即注册</a></p>
</main>
</body>
</html>
