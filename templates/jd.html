<!DOCTYPE html>
<html>
<head>
    <title>岗位JD分析 - MJ的AI助手</title>
    <style>
        body {
            text-align: center;
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        h1 { color: #59c3f7; }
        textarea {
            width: 90%;
            max-width: 800px;
            height: 200px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            resize: vertical;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #59c3f7;
            color: #fff;
            cursor: pointer;
        }
        .message {
            color: #ffcc00;
            margin-bottom: 10px;
        }
        .analysis {
            width: 90%;
            max-width: 800px;
            text-align: left;
            margin: 20px auto;
            padding: 15px;
            background-color: #222;
            border-radius: 10px;
            white-space: pre-wrap;
        }
        .top-bar {
            margin-bottom: 10px;
        }
        .top-bar a {
            color: #59c3f7;
            text-decoration: none;
            margin-left: 10px;
        }
        .navbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 15px 0;
            flex-wrap: wrap;
        }
        .nav-item {
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #444;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }
        .nav-item.active {
            background-color: #59c3f7;
            font-weight: bold;
        }
        .nav-item:hover {
            background-color: #666;
        }
        .nav-item.active:hover {
            background-color: #59c3f7;
        }
    </style>
</head>
<body>
    <h1>岗位JD分析</h1>
    <div class="navbar">
        <a href="/" class="nav-item">AI聊天</a>
        <a href="/jd" class="nav-item active">岗位JD分析</a>
        <a href="/resume" class="nav-item">简历上传分析</a>
        <a href="/match" class="nav-item">简历JD匹配</a>
        <a href="/history" class="nav-item">分析历史</a>
        <a href="/knowledge-chat" class="nav-item">知识库问答</a>
        <a href="/logout" class="nav-item">退出登录</a>
    </div>
    <div style="margin-bottom: 10px;">
        <span>欢迎, {{ username }}</span>
    </div>
    <hr>
    <div class="message">{{ error or '' }}</div>
    <form method="POST">
        <textarea name="jd_text" placeholder="请粘贴岗位JD描述"></textarea>
        <br>
        <button type="submit">开始分析</button>
    </form>

    {% if analysis %}
    <div class="analysis">
        {{ analysis }}
    </div>
    {% endif %}
</body>
</html>
